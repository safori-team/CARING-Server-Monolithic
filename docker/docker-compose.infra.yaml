services:
  mysql:
    image: mysql:8.0
    container_name: caring-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: caring
      MYSQL_USER: caring
      MYSQL_PASSWORD: caring
    ports:
      - "3306:3306"
    volumes:
      - caring-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: caring-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  caring-mysql-data:
