server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: caring-server

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}
      region:
        static: ${AWS_REGION:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET:}

token:
  secret-user: ${TOKEN_SECRET_USER}

fcm:
  key:
    base64: ${FCM_KEY_BASE64:}

openapi:
  service:
    url: ${OPENAPI_SERVICE_URL:http://localhost:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8090}

hume:
  api-key: ${HUME_API_KEY:}
  base-url: ${HUME_BASE_URL:https://api.hume.ai/v0}
  callback-url: ${HUME_CALLBACK_URL:http://localhost:8080/v1/api/hume/callback}

sqs:
  diary-to-chatbot-url: ${DIARY_TO_CHATBOT_SQS_URL:}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9082}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
