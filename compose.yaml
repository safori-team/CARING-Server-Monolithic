services:
  redis:
    image: redis:7-alpine
    container_name: caring-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - caring-net

  caring-server:
    container_name: caring-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # --- Spring ---
      SPRING_PROFILES_ACTIVE: docker
      # --- DB (컨테이너 내부 mysql 서비스 사용) ---
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME:-caring}
      DB_PASSWORD: ${DB_PASSWORD:-caring}
      # --- Redis ---
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
      - "9082:9082"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - caring-net

networks:
  caring-net:
    name: caring-monolith-net

volumes:
  mysql-data:
