services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: caring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: msa_user
      RABBITMQ_DEFAULT_PASS: test123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - caring-net

  config-server:
    container_name: config-service
    build:
      context: ../caring-back/caring-back
      dockerfile: ../caring-server-monolithic/docker/config-service.Dockerfile
    environment:
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_PASSWORD: ${GITHUB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: msa_user
      SPRING_RABBITMQ_PASSWORD: test123
      MANAGEMENT_SERVER_PORT: 9888
    ports:
      - "8888:8888"
      - "9888:9888"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - caring-net

  mysql:
    image: mysql:8.0
    container_name: caring-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: caring
      MYSQL_USER: caring
      MYSQL_PASSWORD: caring
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - caring-net

  redis:
    image: redis:7-alpine
    container_name: caring-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - caring-net

  caring-server:
    container_name: caring-server
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URI: http://config-service:8888
      SPRING_CLOUD_CONFIG_NAME: ${SPRING_CLOUD_CONFIG_NAME:-caring-server}
      DB_URL: ${DOCKER_DB_URL:-jdbc:mysql://mysql:3306/caring?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-caring}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-caring}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MANAGEMENT_SERVER_PORT: 9082
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
      - "9082:9082"
    depends_on:
      config-server:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caring-net

networks:
  caring-net:
    name: caring-monolith-net

volumes:
  mysql-data:
